# Gruvbox Dark theme for Newsboat.
# Palette notes (256-color): bg0=235 (#282828), bg1=237, fg1=223,
# red=167, green=142, yellow=214, blue=109, purple=175, aqua=108, gray=245.

color background          color223 color235
color listnormal          color223 color235
color listnormal_unread   color142 color235 bold
color listfocus           color235 color214 bold
color listfocus_unread    color235 color214 bold
color info                color223 color235
color article             color223 color235

# Extra UI elements supported by recent Newsboat versions.
color title               color235 color214 bold
color hint-key            color214 color235 bold
color hint-keys-delimiter color245 color235
color hint-separator      color245 color235
color hint-description    color223 color235
color end-of-text-marker  color245 color235

# Article/readability highlights.
highlight article "^(Feed|Link):.*$"         color214 default bold
highlight article "^(Title|Date|Author):.*$" color214 default bold
highlight article "https?://[^ ]+"           color142 default underline
highlight article "\\[[0-9]+\\]"             color142 default bold
highlight article "\\[image\\ [0-9]+\\]"     color142 default bold
highlight article "\\bTODO\\b|\\bFIXME\\b"   color167 default bold

# Feed/article list accents.
highlight feedlist "^─.*$" color108 color108 bold
